AWSTemplateFormatVersion: '2010-09-09'\nDescription: Networking Resources for PCI-DSS Compliant AWS Solution\n\nResources:\n  # VPC\n  MyVPC:\n    Type: 'AWS::EC2::VPC'\n    Properties:\n      CidrBlock: '10.0.0.0/16'\n      EnableDnsSupport: 'true'\n      EnableDnsHostname: 'true'\n      Tags:\n        - Key: Name\n          Value: PCI-DSS-VPC\n\n  # Internet Gateway\n  MyInternetGateway:\n    Type: 'AWS::EC2::InternetGateway'\n\n  AttachGateway:\n    Type: 'AWS::EC2::VPCGatewayAttachment'\n    Properties:\n      VpcId: !Ref MyVPC\n      InternetGatewayId: !Ref MyInternetGateway\n\n  # Public Subnet\n  PublicSubnet:\n    Type: 'AWS::EC2::Subnet'\n    Properties:\n      VpcId: !Ref MyVPC\n      CidrBlock: '10.0.1.0/24'\n      MapPublicIpOnLaunch: 'true'\n      AvailabilityZone: !Select [0, !GetAZs '']\n\n  # Private Subnet\n  PrivateSubnet:\n    Type: 'AWS::EC2::Subnet'\n    Properties:\n      VpcId: !Ref MyVPC\n      CidrBlock: '10.0.2.0/24'\n      AvailabilityZone: !Select [0, !GetAZs '']\n\n  # NAT Gateway\n  MyEIP:\n    Type: 'AWS::EC2::EIP'\n\n  MyNatGateway:\n    Type: 'AWS::EC2::NatGateway'\n    Properties:\n      AllocationId: !GetAtt MyEIP.AllocationId\n      SubnetId: !Ref PublicSubnet\n\n  # Route Tables\n  PublicRouteTable:\n    Type: 'AWS::EC2::RouteTable'\n    Properties:\n      VpcId: !Ref MyVPC\n\n  PublicRoute:\n    Type: 'AWS::EC2::Route'\n    Properties:\n      RouteTableId: !Ref PublicRouteTable\n      DestinationCidrBlock: '0.0.0.0/0'\n      GatewayId: !Ref MyInternetGateway\n\n  # Private Route Table\n  PrivateRouteTable:\n    Type: 'AWS::EC2::RouteTable'\n    Properties:\n      VpcId: !Ref MyVPC\n\n  PrivateRoute:\n    Type: 'AWS::EC2::Route'\n    Properties:\n      RouteTableId: !Ref PrivateRouteTable\n      DestinationCidrBlock: '0.0.0.0/0'\n      NatGatewayId: !Ref MyNatGateway\n\n  # Security Groups\n  PublicSG:\n    Type: 'AWS::EC2::SecurityGroup'\n    Properties:\n      GroupDescription: 'Allow HTTP and SSH access'\n      VpcId: !Ref MyVPC\n      SecurityGroupIngress:\n        - IpProtocol: 'tcp'\n          FromPort: '80'\n          ToPort: '80'\n          CidrIp: '0.0.0.0/0'\n        - IpProtocol: 'tcp'\n          FromPort: '22'\n          ToPort: '22'\n          CidrIp: '0.0.0.0/0'\n\n  PrivateSG:\n    Type: 'AWS::EC2::SecurityGroup'\n    Properties:\n      GroupDescription: 'Private subnet access'\n      VpcId: !Ref MyVPC\n      SecurityGroupIngress:\n        - IpProtocol: 'tcp'\n          FromPort: '443'\n          ToPort: '443'\n          CidrIp: '10.0.0.0/16'\n\nOutputs:\n  VPCId:\n    Description: 'VPC ID'\n    Value: !Ref MyVPC\n  PublicSubnetId:\n    Description: 'Public Subnet ID'\n    Value: !Ref PublicSubnet\n  PrivateSubnetId:\n    Description: 'Private Subnet ID'\n    Value: !Ref PrivateSubnet\n